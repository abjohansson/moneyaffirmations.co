  <text x="68" y="630" fill="#C9A84C" font-family="Georgia,'Times New Roman',serif" font-size="22" font-weight="700" opacity="0.7">04</text>
  <text x="110" y="622" fill="#F8F2E4" font-family="Georgia,'Times New Roman',serif" font-size="32" font-style="italic">"Abundance is my</text>
  <text x="110" y="662" fill="#F8F2E4" font-family="Georgia,'Times New Roman',serif" font-size="32" font-style="italic">natural state of being."</text>
