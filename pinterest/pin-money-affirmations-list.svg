  <text x="110" y="512" fill="#F8F2E4" font-family="Georgia,'Times New Roman',serif" font-size="32" font-style="italic">"I am worthy of wealth</text>
  <text x="110" y="552" fill="#F8F2E4" font-family="Georgia,'Times New Roman',serif" font-size="32" font-style="italic">and financial freedom."</text>
