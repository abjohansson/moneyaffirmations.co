<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, follow">
  <meta name="description" content="This page doesn't exist — but your path to abundance does. Head back home.">
  <title>Page Not Found | MoneyAffirmations.co</title>
  <link rel="stylesheet" href="/assets/shared.css">
  <style>
    .error-page {
      min-height: calc(100vh - 64px - 120px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8rem 1.5rem 5rem;
      background: radial-gradient(ellipse at center, rgba(201, 168, 76, 0.06) 0%, transparent 65%),
                  var(--dark);
    }

    .error-code {
      font-family: 'Playfair Display', serif;
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 900;
      color: var(--gold);
      line-height: 1;
      margin-bottom: 0.25rem;
      letter-spacing: -0.03em;
      opacity: 0.9;
    }

    .error-page h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      color: var(--cream);
      margin-bottom: 1.25rem;
    }

    .error-page .message {
      color: var(--text-muted);
      font-size: clamp(1rem, 2.5vw, 1.15rem);
      max-width: 480px;
      margin: 0 auto 2.5rem;
      line-height: 1.7;
    }

    .error-actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .divider-ornament {
      color: var(--gold);
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      opacity: 0.5;
      letter-spacing: 0.5rem;
    }
  </style>
</head>
<body>

  <!-- Site Header -->
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="logo">MoneyAffirmations.co</a>
      <nav>
        <a href="/">Home</a>
        <a href="/money-affirmations/">Money Affirmations</a>
        <a href="/blog/">Blog</a>
      </nav>
    </div>
  </header>

  <!-- 404 Content -->
  <main class="error-page">
    <div class="error-code">404</div>
    <h1>Page Not Found</h1>
    <div class="divider-ornament">&#10022; &#10022; &#10022;</div>
    <p class="message">
      The affirmation you're looking for has moved on to abundance elsewhere.
    </p>
    <div class="error-actions">
      <a href="/" class="btn btn-gold">Go Home</a>
      <a href="/blog/" class="btn btn-outline">Read Our Blog</a>
    </div>
  </main>

  <!-- Site Footer -->
  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 <a href="/">MoneyAffirmations.co</a> &mdash; All rights reserved.</p>
      <p>Manifest your financial abundance, one affirmation at a time.</p>
    </div>
  </footer>

</body>
</html>
